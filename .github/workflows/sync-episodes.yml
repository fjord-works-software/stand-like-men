name: Sync Episodes from Podbean

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Import new episodes
        run: node scripts/import-episodes.mjs

      - name: Commit new episodes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/episodes/
          if git diff --cached --quiet; then
            echo "No new episodes to commit."
          else
            git commit -m "chore: sync new episodes from Podbean"
            git push
          fi
